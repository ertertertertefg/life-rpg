
        <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Life RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1a1a1a;
            --text: #e8e8e8;
            --text-dim: #666;
            --accent: #39ff14;
            --accent-dim: rgba(57, 255, 20, 0.15);
            --accent-glow: rgba(57, 255, 20, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ШАПКА */
        .header {
            padding: 40px 20px 30px;
            text-align: center;
            background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
        }

        .avatar {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }

        .username {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .level-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 6px 16px;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            padding: 0 15px;
            gap: 8px;
            margin-bottom: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--accent);
        }

        /* КОНТЕНТ */
        .page {
            display: none;
            padding: 15px;
            animation: in 0.25s ease;
        }

        .page.active { display: block; }

        @keyframes in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* СТАТЫ */
        .stat-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .stat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .stat-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-emoji {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: var(--accent-dim);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            border: 1px solid rgba(57,255,20,0.2);
        }

        .stat-name {
            font-size: 16px;
            font-weight: 600;
        }

        .stat-lvl {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .stat-num {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .stat-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ОБЩИЙ ОПЫТ */
        .xp-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            margin-top: 5px;
            border: 1px solid rgba(57,255,20,0.15);
            position: relative;
            overflow: hidden;
        }

        .xp-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.15;
        }

        .xp-label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        .xp-value {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent);
            margin: 8px 0;
            text-shadow: 0 0 30px var(--accent-glow);
            position: relative;
        }

        /* ДОБАВИТЬ */
        .cat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cat {
            padding: 20px 10px;
            border-radius: 16px;
            background: var(--surface);
            border: 2px solid transparent;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .cat .e { display: block; font-size: 28px; margin-bottom: 6px; }

        .cat.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        .cat:active { transform: scale(0.97); }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: var(--surface);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn-main {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: var(--accent);
            color: #000;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-main:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        /* ИСТОРИЯ */
        .section-title {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 30px 0 14px;
        }

        .ach {
            background: var(--surface);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .ach-text { flex: 1; }
        .ach-title { font-size: 15px; margin-bottom: 4px; }
        .ach-date { font-size: 11px; color: var(--text-dim); }
        .ach-tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 700;
        }

        /* ЦЕЛИ */
        .goal {
            background: var(--surface);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .goal-check {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .goal-check.done {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .goal-check.done::after {
            content: '✓';
            color: #000;
            font-weight: 900;
            font-size: 14px;
        }

        .goal-text {
            flex: 1;
            font-size: 15px;
            transition: all 0.2s;
        }

        .goal-text.done {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .goal-del {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        .goal-del:active { color: #ff4444; }

        /* ПУСТО */
        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }
        .empty .e { font-size: 44px; margin-bottom: 10px; display: block; }
        .empty p { font-size: 14px; }

        /* СТАТУС */
        .status {
            position: fixed;
            top: 10px; right: 10px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            z-index: 100;
            transition: all 0.3s;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status.ok { color: var(--accent); }
        .status.load { color: #f59e0b; }
        .status.err { color: #ff4444; }
    </style>
</head>
<body>

    <div class="status ok" id="st">✓ Готово</div>

    <div class="header">
        <div class="avatar">🧙‍♂️</div>
        <div class="username" id="un">Герой</div>
        <div class="level-pill">⭐ <span id="ul">1</span> LVL</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="tab('p')">📊 Статсы</button>
        <button class="tab" onclick="tab('a')">➕ Апнуть</button>
        <button class="tab" onclick="tab('g')">🎯 Цели</button>
    </div>

    <!-- ПРОГРЕСС -->
    <div id="p" class="page active">
        <div class="stat-card">
            <div class="stat-top">
                <div class="stat-left">
                    <div class="stat-emoji">🧠</div>
                    <div>
                        <div class="stat-name">Интеллект</div>
                        <div class="stat-lvl">LVL <span id="il">1</span></div>
                    </div>
                </div>
                <div class="stat-num" id="iv">0</div>
            </div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="ib" style="width:0%"></div></div>
        </div>

        <div class="stat-card">
            <div class="stat-top">
                <div class="stat-left">
                    <div class="stat-emoji">💪</div>
                    <div>
                        <div class="stat-name">Сила</div>
                        <div class="stat-lvl">LVL <span id="sl">1</span></div>
                    </div>
                </div>
                <div class="stat-num" id="sv">0</div>
            </div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="sb" style="width:0%"></div></div>
        </div>

        <div class="stat-card">
            <div class="stat-top">
                <div class="stat-left">
                    <div class="stat-emoji">❤️</div>
                    <div>
                        <div class="stat-name">Здоровье</div>
                        <div class="stat-lvl">LVL <span id="hl">1</span></div>
                    </div>
                </div>
                <div class="stat-num" id="hv">0</div>
            </div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="hb" style="width:0%"></div></div>
        </div>

        <div class="xp-card">
            <div class="xp-label">Всего опыта</div>
            <div class="xp-value" id="tx">0</div>
        </div>
    </div>

    <!-- ДОБАВИТЬ -->
    <div id="a" class="page">
        <div class="cat-grid">
            <button class="cat selected" onclick="cat('i')" data-c="i">
                <span class="e">🧠</span>Интеллект
            </button>
            <button class="cat" onclick="cat('s')" data-c="s">
                <span class="e">💪</span>Сила
            </button>
            <button class="cat" onclick="cat('h')" data-c="h">
                <span class="e">❤️</span>Здоровье
            </button>
        </div>

        <input type="text" id="at" placeholder="Что сделал? (например: 'Прочитал 20 стр.')">
        <button class="btn-main" onclick="add()">+1 ОЧКО</button>

        <div class="section-title">История</div>
        <div id="al"></div>
    </div>

    <!-- ЦЕЛИ -->
    <div id="g" class="page">
        <div style="display:flex;gap:10px;margin-bottom:20px;">
            <input type="text" id="gt" placeholder="Новая цель..." style="flex:1;margin:0;">
            <button class="btn-main" onclick="gadd()" style="width:auto;padding:0 22px;font-size:22px;">+</button>
        </div>
        <div id="gl">
            <div class="empty"><span class="e">📝</span><p>Нет целей. Добавь первую!</p></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#0a0a0a');
        tg.setBackgroundColor('#0a0a0a');

        let u = tg.initDataUnsafe.user;
        if (u) document.getElementById('un').textContent = u.first_name || 'Герой';

        let s = {i:0, s:0, h:0};
        let ach = [];
        let g = [];
        let sc = 'i';

        function st(t, x) {
            let e = document.getElementById('st');
            e.className = 'status ' + t;
            e.textContent = x;
        }

        function lvl(p) { return Math.floor(p/10)+1; }
        function prg(p) { return (p%10)*10; }

        function ld() {
            st('load', '⏳ Загрузка...');
            tg.CloudStorage.getItem('d', (err, v) => {
                if (!err && v) {
                    let d = JSON.parse(v);
                    s = d.s || s; ach = d.a || []; g = d.g || [];
                } else {
                    let b = localStorage.getItem('b');
                    if (b) { let d = JSON.parse(b); s = d.s || s; ach = d.a || []; g = d.g || []; }
                }
                up(); ra(); rg(); st('ok', '✓ Готово');
            });
        }

        function sv() {
            st('load', '⏳ Сохранение...');
            let d = JSON.stringify({s:s, a:ach, g:g});
            tg.CloudStorage.setItem('d', d, (err) => {
                if (err) localStorage.setItem('b', d);
                st('ok', '✓ Сохранено');
            });
        }

        function up() {
            ['i','s','h'].forEach(x => {
                document.getElementById(x+'v').textContent = s[x];
                document.getElementById(x+'l').textContent = lvl(s[x]);
                document.getElementById(x+'b').style.width = prg(s[x])+'%';
            });
            let t = s.i + s.s + s.h;
            document.getElementById('tx').textContent = t;
            document.getElementById('ul').textContent = lvl(t);
        }

        function tab(x) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(x).classList.add('active');
            event.target.classList.add('active');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function cat(x) {
            sc = x;
            document.querySelectorAll('.cat').forEach(c => c.classList.toggle('selected', c.dataset.c === x));
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function add() {
            let t = document.getElementById('at').value.trim();
            if (!t) { if (tg.showAlert) tg.showAlert('Введи достижение!'); return; }
            
            s[sc]++;
            ach.unshift({
                t: t, c: sc,
                d: new Date().toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}),
                e: sc==='i'?'🧠':sc==='s'?'💪':'❤️'
            });
            if (ach.length > 30) ach.pop();
            
            document.getElementById('at').value = '';
            up(); ra(); sv();
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
                tg.HapticFeedback.impactOccurred('heavy');
            }
            
            let n = {i:'Интеллект', s:'Сила', h:'Здоровье'};
            if (tg.showPopup) tg.showPopup({
                title: '+1 к ' + n[sc],
                message: '"' + t + '"',
                buttons: [{type:'ok', text:'Круто!'}]
            });
        }

        function ra() {
            let el = document.getElementById('al');
            if (!ach.length) { el.innerHTML = '<div class="empty"><span class="e">🌟</span><p>Нет достижений. Апни первое!</p></div>'; return; }
            el.innerHTML = ach.map(a => `
                <div class="ach">
                    <div class="ach-text">
                        <div class="ach-title">${a.e} ${a.t}</div>
                        <div class="ach-date">${a.d}</div>
                    </div>
                    <span class="ach-tag">+1</span>
                </div>
            `).join('');
        }

        function gadd() {
            let t = document.getElementById('gt').value.trim();
            if (!t) return;
            g.push({id:Date.now(), t:t, done:false});
            document.getElementById('gt').value = '';
            rg(); sv();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function gtg(id) {
            let x = g.find(i => i.id === id);
            if (x) { x.done = !x.done; rg(); sv(); if (x.done && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); }
        }

        function gdel(id) { g = g.filter(i => i.id !== id); rg(); sv(); }

        function rg() {
            let el = document.getElementById('gl');
            if (!g.length) { el.innerHTML = '<div class="empty"><span class="e">📝</span><p>Нет целей. Добавь первую!</p></div>'; return; }
            el.innerHTML = g.map(x => `
                <div class="goal">
                    <div class="goal-check ${x.done?'done':''}" onclick="gtg(${x.id})"></div>
                    <div class="goal-text ${x.done?'done':''}">${x.t}</div>
                    <button class="goal-del" onclick="gdel(${x.id})">✕</button>
                </div>
            `).join('');
        }

        document.getElementById('at').addEventListener('keypress', e => { if (e.key === 'Enter') add(); });
        document.getElementById('gt').addEventListener('keypress', e => { if (e.key === 'Enter') gadd(); });

        ld();
    </script>
</body>
</html>
